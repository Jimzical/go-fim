# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: go-fim

before:
  hooks:
    - go mod tidy

builds:
  - id: go-fim
    main: ./cmd/go-fim
    binary: go-fim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - gofim.yml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Jimzical
    name: go-fim
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"

# No Docker builds - binary releases only
