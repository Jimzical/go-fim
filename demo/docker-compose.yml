name: go-fim-demo

services:
  server:
    build:
      context: ../server
    image: go-fim-server
    environment:
      GOFIM_DB_PATH: /data/server.db
    volumes:
      - server-data:/data
    # Expose only to internal network; Caddy handles external access
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    depends_on: [server]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    ports:
      - "443:443"
      - "80:80"

  agent-alpha:
    build:
      context: ..
      dockerfile: build/agent.Dockerfile
    image: go-fim-agent
    depends_on: [caddy]
    # Bind-mount host path at the SAME absolute path inside the container so
    # report entries reference the real host paths, not /scan/...  Trade-off:
    # hardcodes /Users/arishkumar/... into compose; fine for single-user demo.
    volumes:
      - ${HOME}/Developer/Learning/file-checker:${HOME}/Developer/Learning/file-checker:ro
      - alpha-data:/data
      - ./alpha.gofim.yml:/etc/gofim/gofim.yml:ro

  agent-bravo:
    image: go-fim-agent
    depends_on: [agent-alpha, caddy]
    volumes:
      - ${HOME}/Developer/Learning:${HOME}/Developer/Learning:ro
      - bravo-data:/data
      - ./bravo.gofim.yml:/etc/gofim/gofim.yml:ro

  agent-charlie:
    image: go-fim-agent
    depends_on: [agent-alpha, caddy]
    volumes:
      - ${HOME}/Developer/Personal:${HOME}/Developer/Personal:ro
      - charlie-data:/data
      - ./charlie.gofim.yml:/etc/gofim/gofim.yml:ro

volumes:
  server-data:
  caddy-data:
  alpha-data:
  bravo-data:
  charlie-data:
