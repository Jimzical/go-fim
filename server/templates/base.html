<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}go-fim{% endblock %}</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --amber: #d29922;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    header .crumb { color: var(--muted); }
    header a { color: var(--accent); text-decoration: none; }
    main { padding: 24px; max-width: 960px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover td { background: var(--panel); }
    a { color: var(--accent); }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .dot-green { background: var(--green); }
    .dot-amber { background: var(--amber); }
    .dot-red { background: var(--red); }
    .dot-grey { background: var(--muted); }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
    .card-head .ts { font-weight: 600; }
    .pill {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-right: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }
    .pill-c { color: var(--green); border-color: rgba(63,185,80,0.4); }
    .pill-m { color: var(--amber); border-color: rgba(210,153,34,0.4); }
    .pill-d { color: var(--red); border-color: rgba(248,81,73,0.4); }
    details { margin-top: 10px; }
    details summary { cursor: pointer; color: var(--muted); }
    details ul { list-style: none; padding-left: 0; margin: 8px 0 0; }
    details li { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; padding: 2px 0; }
    .sym-c { color: var(--green); }
    .sym-m { color: var(--amber); }
    .sym-d { color: var(--red); }
    .empty { color: var(--muted); font-style: italic; }
  </style>
  <script src="https://unpkg.com/htmx.org@2.0/dist/htmx.min.js" defer></script>
</head>
<body>
  <header>
    <h1><a href="/">go-fim</a></h1>
    {% block crumb %}{% endblock %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
